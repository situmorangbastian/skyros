services:
  skyros.postgres:
    image: postgres:16
    container_name: skyros.postgres.database
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  skyros.gatewayservice:
    image: skyros-gateway-service:latest
    container_name: skyros.gatewayservice.svc
    build:
      context: .
      dockerfile: Dockerfile-gatewayservice
    environment:
      - PORT=${GATEWAY_PORT}
      - USER_SERVICE_GRPC=${USER_GRPC_SERVICE_ENDPOINT}
      - PRODUCT_SERVICE_GRPC=${PRODUCT_GRPC_SERVICE_ENDPOINT}
      - ORDER_SERVICE_GRPC=${ORDER_GRPC_SERVICE_ENDPOINT}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      skyros.userservice:
        condition: service_started
      skyros.productservice:
        condition: service_started
      skyros.orderservice:
        condition: service_started

  skyros.userservice:
    image: skyros-user-service:latest
    container_name: skyros.userservice.svc
    build:
      context: .
      dockerfile: Dockerfile-userservice
    restart: always
    environment:
      - DATABASE_URL=${USER_DATABASE_URL}
      - SECRET_KEY=${USER_SECRET_KEY}
      - GRPC_SERVER_PORT=${USER_GRPC_SERVER_PORT}
      - GRPC_SERVICE_ENDPOINT=${USER_GRPC_SERVICE_ENDPOINT}
      - GRPC_GATEWAY_SERVER_PORT=${USER_GRPC_GATEWAY_SERVER_PORT}
      - ENABLE_GATEWAY_GRPC=${ENABLE_GATEWAY_GRPC}
      - APP_ENV=${APP_ENV}
    ports:
      - "${USER_GRPC_SERVER_PORT}:${USER_GRPC_SERVER_PORT}"
    depends_on:
      skyros.postgres:
        condition: service_healthy

  skyros.productservice:
    image: skyros-product-service:latest
    container_name: skyros.productservice.svc
    build:
      context: .
      dockerfile: Dockerfile-productservice
    restart: always
    environment:
      - DATABASE_URL=${PRODUCT_DATABASE_URL}
      - SECRET_KEY=${PRODUCT_SECRET_KEY}
      - GRPC_SERVER_PORT=${PRODUCT_GRPC_SERVER_PORT}
      - GRPC_SERVICE_ENDPOINT=${PRODUCT_GRPC_SERVICE_ENDPOINT}
      - GRPC_GATEWAY_SERVER_PORT=${PRODUCT_GRPC_GATEWAY_SERVER_PORT}
      - USER_SERVICE_GRPC=${USER_GRPC_SERVICE_ENDPOINT}
      - ENABLE_GATEWAY_GRPC=${ENABLE_GATEWAY_GRPC}
      - APP_ENV=${APP_ENV}
    ports:
      - "${PRODUCT_GRPC_SERVER_PORT}:${PRODUCT_GRPC_SERVER_PORT}"
    depends_on:
      skyros.postgres:
        condition: service_healthy

  skyros.orderservice:
    image: skyros-order-service:latest
    container_name: skyros.orderservice.svc
    build:
      context: .
      dockerfile: Dockerfile-orderservice
    restart: always
    environment:
      - DATABASE_URL=${ORDER_DATABASE_URL}
      - SECRET_KEY=${ORDER_SECRET_KEY}
      - GRPC_SERVER_PORT=${ORDER_GRPC_SERVER_PORT}
      - GRPC_SERVICE_ENDPOINT=${ORDER_GRPC_SERVICE_ENDPOINT}
      - GRPC_GATEWAY_SERVER_PORT=${ORDER_GRPC_GATEWAY_SERVER_PORT}
      - USER_SERVICE_GRPC=${USER_GRPC_SERVICE_ENDPOINT}
      - PRODUCT_SERVICE_GRPC=${PRODUCT_GRPC_SERVICE_ENDPOINT}
      - ENABLE_GATEWAY_GRPC=${ENABLE_GATEWAY_GRPC}
      - APP_ENV=${APP_ENV}
    ports:
      - "${ORDER_GRPC_SERVER_PORT}:${ORDER_GRPC_SERVER_PORT}"
    depends_on:
      skyros.postgres:
        condition: service_healthy

volumes:
  postgres_data:
